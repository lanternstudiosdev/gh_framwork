# HR subject area — production entity catalog (Workday).
#
# load_pattern default: lakeflow_connect
# Table names: {source_key}_{entity_name} e.g. workday_current_employee_list
# Schemas only: bronze | bronze_restricted | silver | silver_restricted | gold | gold_restricted
#
# Ownership (Connect path):
#   Connect writes:  {data_catalog}.{bronze|bronze_restricted}.{workday_*}__src
#   Framework DLT:   {data_catalog}.{bronze|bronze_restricted}.{workday_*}  (final bronze)
# {data_catalog} is resolved at Config Apply from env (edw_hr_dev / edw_hr_qat / ...).
#
# Fallback: load_pattern api_extract → UC Volume → Auto Loader → same final bronze names.

subject_area_key: hr
entities:
- entity_key: hr_current_employee_list
  source_key: workday
  entity_name: current_employee_list
  source_object: CurrentEmployeeList
  load_pattern: lakeflow_connect
  primary_key_columns:
  - employee_id
  watermark_column: _source_extract_ts
  target_bronze_table: workday_current_employee_list
  target_silver_table: workday_current_employee_list
  restricted: false
  supports_full_reprocess: true
  reprocess_strategy: full_refresh
  is_active: true
  load_config:
    api:
      endpoint_path: /customreport2/{tenant}/CurrentEmployeeList
      http_method: GET
      response_format: json
      params:
        format: json
        include_terminated: 'false'
    auto_loader_options:
      cloudFiles.format: json
      cloudFiles.schemaEvolutionMode: addNewColumns
      cloudFiles.inferColumnTypes: 'true'
    bronze_schema_evolution_mode: addNewColumns
    bronze_accumulate_history: true
    silver_schema_evolution_enabled: true
    silver_allow_new_columns: true
    silver_preserve_dropped_columns: true
    lakeflow_connect_config:
      mode: incremental
      source_object: CurrentEmployeeList
      connection_name: workday_connect
      target_schema: bronze
      bronze_writer: framework_dlt
      connect_writer: lakeflow_connect
